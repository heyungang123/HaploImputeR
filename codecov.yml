comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: auto
        threshold: 1%
        informational: true

ignore:
  - "R/utils.R"
  - "tests/*"